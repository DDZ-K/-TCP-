<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="design-system" content="Ollama-like monochrome" />
  <title>Date Invite</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-elev: #111111;
      --bg-card: #141414;
      --bg-soft: #1a1a1a;
      --bg-hover: #1f1f1f;
      --line: #262626;
      --line-strong: #333333;
      --text: #f5f5f5;
      --text-2: #a3a3a3;
      --text-3: #737373;
      --white: #ffffff;
      --r: 12px;
      --r-lg: 16px;
      --r-pill: 999px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --shadow: 0 0 0 1px var(--line);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .bg { display: none; }
    .app {
      position: relative; z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: 20px 16px calc(28px + var(--safe-b));
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      color: var(--text);
    }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 8px;
      display: grid; place-items: center;
      background: var(--white);
      color: #0a0a0a;
      font-size: 13px;
      font-weight: 700;
    }
    .brand-text b {
      display: block;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .brand-text span {
      display: block;
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400;
      margin-top: 1px;
    }
    .live-chip {
      font-size: 11px;
      color: var(--text-2);
      border: 1px solid var(--line);
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      padding: 6px 10px;
      font-weight: 500;
    }
    .progress {
      display: flex; gap: 4px;
      margin-bottom: 18px;
    }
    .progress i {
      flex: 1; height: 3px; border-radius: var(--r-pill);
      background: var(--line);
      transition: background .25s ease;
    }
    .progress i.on { background: var(--white); }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 22px 18px 18px;
      box-shadow: none;
      animation: in .28s ease;
    }
    @keyframes in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    .badge {
      display: inline-flex; align-items: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--r-pill);
      padding: 5px 10px;
      margin-bottom: 14px;
      letter-spacing: 0.01em;
    }
    .badge::before { display: none; }
    h1 {
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin: 0 0 10px;
      color: var(--text);
    }
    .subtitle {
      color: var(--text-2);
      font-size: 0.92rem;
      line-height: 1.55;
      margin: 0 0 18px;
      font-weight: 400;
    }
    .hero {
      text-align: center;
      margin: 8px 0 18px;
      font-size: 2.4rem;
    }
    .hero-ring {
      width: 88px; height: 88px; margin: 0 auto;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 2.2rem;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      box-shadow: none;
      animation: none;
    }
    .btns { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .btn-row {
      position: relative;
      min-height: 56px;
      display: flex; gap: 10px; justify-content: center; align-items: center;
    }
    button, .chip {
      font-family: var(--font);
      border: 0; cursor: pointer;
      border-radius: var(--r);
      transition: background .15s ease, border-color .15s ease, color .15s ease, opacity .15s ease;
    }
    button:active { opacity: 0.88; }
    .btn {
      width: 100%;
      padding: 13px 16px;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      color: #0a0a0a;
      background: var(--white);
      border: 1px solid var(--white);
      box-shadow: none;
      position: static;
      overflow: visible;
    }
    .btn::after { display: none !important; }
    .btn:hover { background: #e5e5e5; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line-strong);
      box-shadow: none;
    }
    .btn.secondary:hover { background: var(--bg-hover); }
    .btn.ghost {
      background: transparent;
      color: var(--text-3);
      border: 0;
      box-shadow: none;
      font-weight: 500;
      font-size: 0.88rem;
      padding: 10px;
    }
    .btn.ghost:hover { color: var(--text-2); }
    #noBtn {
      position: absolute;
      left: 8%;
      top: 0;
      width: 42%;
      z-index: 2;
      transition: left .25s ease, top .25s ease;
      background: var(--bg-soft);
      color: var(--text-2);
      border: 1px solid var(--line);
      box-shadow: none;
      font-weight: 500;
      padding: 12px 10px;
      font-size: 0.9rem;
      border-radius: var(--r);
      user-select: none;
      touch-action: none;
      backdrop-filter: none;
    }
    #yesBtn {
      position: relative; z-index: 1;
      width: 50%; margin-left: auto; margin-right: 2%;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .option {
      text-align: left;
      padding: 14px 12px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }
    .option::before { display: none; }
    .option .emoji {
      font-size: 1.35rem; display: block; margin-bottom: 8px;
      filter: none;
    }
    .option .title { font-weight: 600; font-size: 0.9rem; letter-spacing: -0.01em; }
    .option .desc { color: var(--text-3); font-size: 0.74rem; margin-top: 4px; line-height: 1.4; }
    .option.selected {
      border-color: var(--white);
      background: var(--bg-hover);
      box-shadow: none;
      transform: none;
    }
    label.field {
      display: block; margin-bottom: 12px;
      font-size: 0.78rem; font-weight: 500; color: var(--text-3);
      letter-spacing: 0.02em;
    }
    input[type="date"], input[type="time"], input[type="text"], textarea, select {
      width: 100%; margin-top: 6px;
      padding: 12px 12px;
      border-radius: var(--r);
      border: 1px solid var(--line);
      background: var(--bg);
      font: inherit;
      color: var(--text);
      outline: none;
      box-shadow: none;
      color-scheme: dark;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--text-3);
      box-shadow: 0 0 0 1px var(--text-3);
      background: var(--bg);
    }
    textarea { min-height: 88px; resize: vertical; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
    .chip {
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--text-2);
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: var(--r-pill);
      box-shadow: none;
    }
    .chip.on {
      background: var(--white);
      border-color: var(--white);
      color: #0a0a0a;
      box-shadow: none;
    }
    .timeline { position: relative; margin: 6px 0 16px; padding-left: 16px; }
    .timeline::before {
      content: "";
      position: absolute; left: 4px; top: 6px; bottom: 6px; width: 1px;
      background: var(--line-strong);
      opacity: 1;
      border-radius: 0;
    }
    .t-item {
      position: relative;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 12px;
      margin-bottom: 8px;
      box-shadow: none;
    }
    .t-item::before {
      content: "";
      position: absolute; left: -15px; top: 15px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--bg);
      border: 1.5px solid var(--text-2);
      box-shadow: none;
    }
    .t-item .time {
      font-size: 0.72rem; color: var(--text-3); font-weight: 500;
      letter-spacing: 0.02em;
      font-family: var(--mono);
    }
    .t-item .what { font-weight: 600; margin-top: 3px; color: var(--text); font-size: 0.92rem; }
    .t-item .tip { font-size: 0.78rem; color: var(--text-3); margin-top: 4px; line-height: 1.45; }
    .checklist label {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--r); padding: 12px;
      margin-bottom: 8px; font-size: 0.88rem;
      color: var(--text-2);
      box-shadow: none;
    }
    .checklist input {
      margin-top: 2px; accent-color: var(--white); width: 16px; height: 16px;
    }
    .ticket {
      position: relative;
      background: var(--bg);
      border: 1px solid var(--line-strong);
      border-radius: var(--r-lg);
      padding: 20px 16px 16px;
      text-align: center;
      box-shadow: none;
      overflow: hidden;
    }
    .ticket::before, .ticket::after {
      content: "";
      position: absolute; top: 50%; width: 14px; height: 14px;
      background: var(--bg-card); border-radius: 50%;
      transform: translateY(-50%);
      border: 1px solid var(--line);
      box-shadow: none;
    }
    .ticket::before { left: -8px; }
    .ticket::after { right: -8px; }
    .ticket .code {
      font-family: var(--mono);
      letter-spacing: 0.14em;
      font-weight: 600;
      color: var(--text);
      font-size: 1rem;
      margin: 12px 0 10px;
    }
    .ticket .row {
      display: flex; justify-content: space-between;
      text-align: left; gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 12px; margin-top: 12px;
      font-size: 0.86rem;
    }
    .ticket .k { color: var(--text-3); font-size: 0.7rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .ticket .v { font-weight: 600; margin-top: 3px; color: var(--text); }
    .toast {
      position: fixed; left: 50%; bottom: calc(20px + var(--safe-b));
      transform: translateX(-50%) translateY(12px);
      background: var(--white);
      color: #0a0a0a;
      padding: 10px 14px; border-radius: var(--r);
      font-size: 0.84rem; opacity: 0; pointer-events: none;
      transition: 0.2s ease; z-index: 99; max-width: 86vw; text-align: center;
      border: 0;
      backdrop-filter: none;
      font-weight: 500;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
    .hearts span {
      position: absolute; bottom: -20px; font-size: 14px;
      animation: rise 2s linear forwards; opacity: 0.55;
      filter: grayscale(1);
    }
    @keyframes rise {
      to { transform: translateY(-110vh); opacity: 0; }
    }
    .footer-note {
      text-align: center;
      color: var(--text-3);
      font-size: 0.72rem;
      margin-top: 18px;
      letter-spacing: 0.02em;
      line-height: 1.5;
    }
    /* kill leftover luxe animations */
    .orb { display: none !important; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="hearts" id="hearts"></div>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">D</div>
        <div class="brand-text">
          <b>Date Invite</b>
          <span>local · private</span>
        </div>
      </div>
      <div class="live-chip">v1</div>
    </div>
    <div class="progress" id="progress"></div>
    <div id="stage"></div>
    <p class="footer-note">ollama-like UI · data stays on device</p>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const TOTAL = 8;
    const state = {
      step: 0,
      theme: null,
      date: "",
      time: "",
      place: "",
      dress: [],
      mood: "",
      message: "",
      checklist: {},
      ticket: "",
    };

    const themes = [
      { id: "dinner", emoji: "🍝", title: "晚餐约会", desc: "暖光、慢聊、好好吃一顿" },
      { id: "cafe", emoji: "☕", title: "咖啡馆", desc: "甜品 + 闲聊 + 发呆合法" },
      { id: "movie", emoji: "🎬", title: "看电影", desc: "并排坐着也算牵手预备" },
      { id: "walk", emoji: "🌙", title: "夜风散步", desc: "慢慢走，把今天说完" },
      { id: "park", emoji: "🧺", title: "公园野餐", desc: "阳光、垫子、一点点仪式感" },
      { id: "surprise", emoji: "🎁", title: "惊喜盲盒", desc: "由发起人安排，你负责开心" },
    ];

    const places = {
      dinner: ["那家一直想去的餐厅", "家附近的暖灯光小馆", "你点菜我付款专场"],
      cafe: ["窗边双人座咖啡馆", "有猫的店", "手冲咖啡实验室"],
      movie: ["最近院线热映", "经典回映厅", "家里投影仪小院线"],
      walk: ["江边 / 湖边步道", "老街灯火", "小区外那条安静路"],
      park: ["城市公园草坪", "天台小野餐", "阳台伪野餐（下雨备用）"],
      surprise: ["保密，集合点另行通知", "你家楼下见", "我来接你出门"],
    };

    const dressOpts = ["轻松舒适", "稍微打扮一下", "情侣色系", "你最有感觉的那套", "运动鞋友好", "拍照好看"];
    const moodOpts = ["甜甜的", "轻松搞笑", "安静陪伴", "冒险探索", "仪式感拉满"];

    const itinerary = {
      dinner: [
        { t: "出发前 30 分钟", w: "确认行程与穿搭", tip: "充电宝 + 微笑" },
        { t: "集合", w: "见面 · 小小拥抱可选", tip: "别迟到超过 5 分钟哦" },
        { t: "正餐", w: "点菜 · 聊天 · 分享今日份故事", tip: "至少说一句今天谢谢你来" },
        { t: "饭后", w: "散步消化 or 甜品续摊", tip: "拍一张合照存档" },
        { t: "收尾", w: "安全送到 / 报平安", tip: "互道晚安" },
      ],
      cafe: [
        { t: "集合", w: "咖啡馆汇合", tip: "先点对方可能喜欢的甜品" },
        { t: "上半场", w: "闲聊 + 手机调勿扰", tip: "认真听对方说话" },
        { t: "中场", w: "一起列「下次想做的事」清单", tip: "写在备忘录里" },
        { t: "下半场", w: "逛附近小店 / 拍照", tip: "自然就好" },
        { t: "告别", w: "约下一次时间", tip: "别只说「回头再说」" },
      ],
      movie: [
        { t: "购票", w: "选片 · 选座（中间偏后黄金位）", tip: "忌剧透" },
        { t: "开场前", w: "零食饮料补给", tip: "少选巨响包装" },
        { t: "观影", w: "沉浸体验", tip: "紧张桥段可以轻轻碰一下手背" },
        { t: "散场", w: "讨论最喜欢的镜头", tip: "意见不同也很好玩" },
        { t: "返程", w: "夜宵可选", tip: "记得路上注意安全" },
      ],
      walk: [
        { t: "集合", w: "约在熟悉的路口", tip: "带一件薄外套" },
        { t: "慢走", w: "边走边聊最近的开心事", tip: "不看手机连续 20 分钟" },
        { t: "停一站", w: "找长椅看风景 / 买杯热饮", tip: "听一听对方的歌单" },
        { t: "折返", w: "选一条不同的路回去", tip: "留一点神秘感" },
        { t: "到家", w: "互道晚安", tip: "说一句今天最喜欢的瞬间" },
      ],
      park: [
        { t: "准备", w: "垫子、湿巾、小食、垃圾袋", tip: "环保小能手" },
        { t: "抵达", w: "选阴凉/视野好的位置", tip: "防晒/防蚊" },
        { t: "主场", w: "吃吃聊聊 · 小游戏", tip: "真心话大冒险轻度版" },
        { t: "收拾", w: "不留垃圾在原地", tip: "留下的只有回忆" },
        { t: "返程", w: "顺路买一份想分享的小吃", tip: "为下次埋伏笔" },
      ],
      surprise: [
        { t: "T-60min", w: "保持电话畅通", tip: "相信发起人" },
        { t: "集合", w: "按通知地点出现即可", tip: "闭眼环节可选" },
        { t: "主线", w: "惊喜环节 × 1", tip: "允许尖叫和大笑" },
        { t: "余韵", w: "轻松收尾活动", tip: "复盘今天的高光" },
        { t: "告别", w: "郑重道谢", tip: "把喜欢说出口" },
      ],
    };

    const $ = (s, el = document) => el.querySelector(s);
    const stage = $("#stage");
    const toastEl = $("#toast");

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.classList.remove("show"), 1800);
    }

    function hearts(n = 14) {
      const box = $("#hearts");
      for (let i = 0; i < n; i++) {
        const s = document.createElement("span");
        s.textContent = ["💕", "💗", "✨", "🌸", "💖"][i % 5];
        s.style.left = Math.random() * 100 + "%";
        s.style.fontSize = 14 + Math.random() * 18 + "px";
        s.style.animationDuration = 1.6 + Math.random() * 1.4 + "s";
        box.appendChild(s);
        setTimeout(() => s.remove(), 2600);
      }
    }

    function renderProgress() {
      const p = $("#progress");
      p.innerHTML = "";
      for (let i = 0; i < TOTAL; i++) {
        const d = document.createElement("i");
        if (i <= state.step) d.classList.add("on");
        p.appendChild(d);
      }
    }

    function save() {
      try { localStorage.setItem("date_invite_v1", JSON.stringify(state)); } catch {}
    }
    function load() {
      try {
        const raw = localStorage.getItem("date_invite_v1");
        if (raw) Object.assign(state, JSON.parse(raw));
      } catch {}
    }

    function ticketCode() {
      const t = Date.now().toString(36).toUpperCase().slice(-4);
      const r = Math.random().toString(36).toUpperCase().slice(2, 6);
      return `DATE-${t}-${r}`;
    }

    function go(step) {
      state.step = step;
      save();
      renderProgress();
      const fns = [viewInvite, viewTheme, viewWhen, viewWhere, viewStyle, viewMessage, viewPlan, viewTicket];
      stage.innerHTML = "";
      fns[step]();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    /* ---------- Step 0: Invite ---------- */
    function viewInvite() {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">💌 专属邀请函</div>
        <div class="hero"><div class="hero-ring">💘</div></div>
        <h1>要不要…和我去约会？</h1>
        <p class="subtitle">这是一份认真的邀请。<br>右边那个「好呀」才是正确答案哦～</p>
        <div class="btn-row" id="arena" style="height:140px;margin-top:8px;">
          <button type="button" class="btn" id="yesBtn">好呀，接受 💕</button>
          <button type="button" id="noBtn">不要</button>
        </div>
        <p class="subtitle" style="margin:14px 0 0;text-align:center;font-size:.8rem;">提示：点「不要」它会自己跑掉，逃不掉的是心动。</p>
      `;
      stage.appendChild(card);

      const arena = $("#arena", card);
      const noBtn = $("#noBtn", card);
      const yesBtn = $("#yesBtn", card);
      let dodge = 0;

      function moveNo(e) {
        if (e) e.preventDefault();
        dodge++;
        const aw = arena.clientWidth;
        const ah = arena.clientHeight;
        const bw = noBtn.offsetWidth;
        const bh = noBtn.offsetHeight;
        const pad = 4;
        let x = Math.random() * Math.max(8, aw - bw - pad);
        let y = Math.random() * Math.max(8, ah - bh - pad);
        // keep away from yes button roughly on the right
        if (x > aw * 0.45 && y < bh + 10) x = Math.random() * (aw * 0.4);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        const msgs = [
          "点不到吧～",
          "再想想嘛",
          "它跑掉了！",
          "接受会简单很多哦",
          "你是不是在笑",
          "还是点右边吧 💕",
        ];
        if (dodge % 2 === 0) toast(msgs[Math.min(msgs.length - 1, Math.floor(dodge / 2) % msgs.length)]);
        if (dodge >= 8) {
          noBtn.textContent = "其实也想…";
        }
        if (dodge >= 14) {
          noBtn.textContent = "好吧我投降";
          noBtn.style.background = "#ffe6ef";
          noBtn.style.color = "var(--pink-deep)";
          noBtn.style.borderColor = "var(--pink)";
          noBtn.onclick = () => accept();
        }
      }

      ["mouseenter", "touchstart", "click"].forEach(ev => {
        noBtn.addEventListener(ev, moveNo, { passive: false });
      });

      function accept() {
        hearts(18);
        toast("太好了！约会正式启动 🎉");
        setTimeout(() => go(1), 450);
      }
      yesBtn.addEventListener("click", accept);
    }

    /* ---------- Step 1: Theme ---------- */
    function viewTheme() {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">第 1 站 · 约会主题</div>
        <h1>今天我们怎么玩？</h1>
        <p class="subtitle">选一个最心动的方向，后面的行程会跟着变。</p>
        <div class="grid" id="themeGrid"></div>
        <div class="btns" style="margin-top:16px">
          <button class="btn" id="next" disabled>下一步</button>
          <button class="btn ghost" id="back">返回</button>
        </div>
      `;
      stage.appendChild(card);
      const grid = $("#themeGrid", card);
      themes.forEach(t => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "option" + (state.theme === t.id ? " selected" : "");
        b.innerHTML = `<span class="emoji">${t.emoji}</span><div class="title">${t.title}</div><div class="desc">${t.desc}</div>`;
        b.onclick = () => {
          state.theme = t.id;
          state.place = "";
          [...grid.children].forEach(c => c.classList.remove("selected"));
          b.classList.add("selected");
          $("#next", card).disabled = false;
          save();
        };
        grid.appendChild(b);
      });
      if (state.theme) $("#next", card).disabled = false;
      $("#next", card).onclick = () => go(2);
      $("#back", card).onclick = () => go(0);
    }

    /* ---------- Step 2: When ---------- */
    function viewWhen() {
      const today = new Date();
      const iso = d => d.toISOString().slice(0, 10);
      if (!state.date) {
        const n = new Date(today); n.setDate(n.getDate() + 1);
        state.date = iso(n);
      }
      if (!state.time) state.time = "18:30";

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">第 2 站 · 时间</div>
        <h1>定个好日子</h1>
        <p class="subtitle">选日期和时间。改主意也没关系，反正你已经接受邀请了 😏</p>
        <label class="field">日期
          <input type="date" id="date" value="${state.date}" min="${iso(today)}" />
        </label>
        <label class="field">时间
          <input type="time" id="time" value="${state.time}" />
        </label>
        <div class="chips" id="quick"></div>
        <div class="btns">
          <button class="btn" id="next">下一步</button>
          <button class="btn ghost" id="back">上一步</button>
        </div>
      `;
      stage.appendChild(card);
      const quick = [
        { label: "今晚", off: 0, time: "19:00" },
        { label: "明天", off: 1, time: "18:30" },
        { label: "这周末", off: ((6 - today.getDay()) + 7) % 7 || 7, time: "15:00" },
        { label: "下周五", off: ((5 - today.getDay()) + 7) % 7 || 7, time: "19:30" },
      ];
      quick.forEach(q => {
        const c = document.createElement("button");
        c.type = "button"; c.className = "chip"; c.textContent = q.label;
        c.onclick = () => {
          const d = new Date(today); d.setDate(d.getDate() + q.off);
          state.date = iso(d); state.time = q.time;
          $("#date", card).value = state.date;
          $("#time", card).value = state.time;
          toast(`已选：${q.label}`);
        };
        $("#quick", card).appendChild(c);
      });
      $("#next", card).onclick = () => {
        state.date = $("#date", card).value;
        state.time = $("#time", card).value;
        if (!state.date || !state.time) return toast("先选好日期和时间哦");
        save(); go(3);
      };
      $("#back", card).onclick = () => go(1);
    }

    /* ---------- Step 3: Where ---------- */
    function viewWhere() {
      const list = places[state.theme] || places.surprise;
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">第 3 站 · 地点</div>
        <h1>去哪儿见面？</h1>
        <p class="subtitle">先选一个方向，也可以自己填写具体店名/路口。</p>
        <div class="chips" id="placeChips"></div>
        <label class="field">具体地点（可改）
          <input type="text" id="place" placeholder="例如：XX 路星巴克 / 地铁 A 口" value="${state.place || ""}" />
        </label>
        <div class="btns">
          <button class="btn" id="next">下一步</button>
          <button class="btn ghost" id="back">上一步</button>
        </div>
      `;
      stage.appendChild(card);
      const chips = $("#placeChips", card);
      list.forEach(p => {
        const c = document.createElement("button");
        c.type = "button";
        c.className = "chip" + (state.place === p ? " on" : "");
        c.textContent = p;
        c.onclick = () => {
          state.place = p;
          $("#place", card).value = p;
          [...chips.children].forEach(x => x.classList.remove("on"));
          c.classList.add("on");
        };
        chips.appendChild(c);
      });
      $("#next", card).onclick = () => {
        state.place = $("#place", card).value.trim();
        if (!state.place) return toast("写个集合地点吧");
        save(); go(4);
      };
      $("#back", card).onclick = () => go(2);
    }

    /* ---------- Step 4: Style ---------- */
    function viewStyle() {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">第 4 站 · 氛围与穿搭</div>
        <h1>约会画风</h1>
        <p class="subtitle">穿搭提示可多选；氛围选一个最贴的。</p>
        <div class="subtitle" style="margin-bottom:6px;font-weight:700;color:var(--ink)">穿搭关键词</div>
        <div class="chips" id="dress"></div>
        <div class="subtitle" style="margin:10px 0 6px;font-weight:700;color:var(--ink)">氛围</div>
        <div class="chips" id="mood"></div>
        <div class="btns">
          <button class="btn" id="next">下一步</button>
          <button class="btn ghost" id="back">上一步</button>
        </div>
      `;
      stage.appendChild(card);
      dressOpts.forEach(d => {
        const c = document.createElement("button");
        c.type = "button";
        c.className = "chip" + (state.dress.includes(d) ? " on" : "");
        c.textContent = d;
        c.onclick = () => {
          if (state.dress.includes(d)) state.dress = state.dress.filter(x => x !== d);
          else state.dress.push(d);
          c.classList.toggle("on");
        };
        $("#dress", card).appendChild(c);
      });
      moodOpts.forEach(m => {
        const c = document.createElement("button");
        c.type = "button";
        c.className = "chip" + (state.mood === m ? " on" : "");
        c.textContent = m;
        c.onclick = () => {
          state.mood = m;
          [...$("#mood", card).children].forEach(x => x.classList.remove("on"));
          c.classList.add("on");
        };
        $("#mood", card).appendChild(c);
      });
      $("#next", card).onclick = () => {
        if (!state.mood) return toast("选一个氛围吧");
        if (!state.dress.length) state.dress = ["轻松舒适"];
        save(); go(5);
      };
      $("#back", card).onclick = () => go(3);
    }

    /* ---------- Step 5: Message ---------- */
    function viewMessage() {
      const presets = [
        "谢谢你愿意赴约，我会准时又靠谱。",
        "不是随便约，是想认真陪你过几个小时。",
        "你来就好，剩下的我来张罗。",
        "今天目标：让你笑至少三次。",
      ];
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">第 5 站 · 一句真心话</div>
        <h1>写给对方的话</h1>
        <p class="subtitle">会出现在最终约会票根上。短一点也动人。</p>
        <div class="chips" id="presets"></div>
        <label class="field">留言
          <textarea id="msg" placeholder="写点什么…">${state.message || ""}</textarea>
        </label>
        <div class="btns">
          <button class="btn" id="next">生成约会计划</button>
          <button class="btn ghost" id="back">上一步</button>
        </div>
      `;
      stage.appendChild(card);
      presets.forEach(p => {
        const c = document.createElement("button");
        c.type = "button"; c.className = "chip"; c.textContent = p.slice(0, 10) + "…";
        c.title = p;
        c.onclick = () => { $("#msg", card).value = p; toast("已填入"); };
        $("#presets", card).appendChild(c);
      });
      $("#next", card).onclick = () => {
        state.message = $("#msg", card).value.trim() || presets[0];
        save(); go(6);
      };
      $("#back", card).onclick = () => go(4);
    }

    /* ---------- Step 6: Plan ---------- */
    function viewPlan() {
      const items = itinerary[state.theme] || itinerary.surprise;
      const theme = themes.find(t => t.id === state.theme) || themes[0];
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">第 6 站 · 完整流程</div>
        <h1>${theme.emoji} ${theme.title}行程</h1>
        <p class="subtitle">${state.date} ${state.time} · ${state.place}<br>氛围：${state.mood || "—"} · 穿搭：${(state.dress || []).join(" / ") || "—"}</p>
        <div class="timeline" id="tl"></div>
        <div class="subtitle" style="font-weight:700;color:var(--ink);margin-bottom:8px">出发前清单</div>
        <div class="checklist" id="ck"></div>
        <div class="btns">
          <button class="btn" id="next">生成约会票根</button>
          <button class="btn secondary" id="share">复制行程摘要</button>
          <button class="btn ghost" id="back">上一步</button>
        </div>
      `;
      stage.appendChild(card);
      items.forEach(it => {
        const d = document.createElement("div");
        d.className = "t-item";
        d.innerHTML = `<div class="time">${it.t}</div><div class="what">${it.w}</div><div class="tip">${it.tip}</div>`;
        $("#tl", card).appendChild(d);
      });
      const checks = [
        "手机电量 > 50% / 带充电宝",
        "确认交通与到场时间",
        "现金或支付方式准备好",
        "把今天的开心事留给对方",
        "如果迟到，提前发消息",
      ];
      checks.forEach((c, i) => {
        const id = "ck" + i;
        if (state.checklist[id] == null) state.checklist[id] = false;
        const lab = document.createElement("label");
        lab.innerHTML = `<input type="checkbox" id="${id}" ${state.checklist[id] ? "checked" : ""}/><span>${c}</span>`;
        lab.querySelector("input").onchange = (e) => {
          state.checklist[id] = e.target.checked;
          save();
        };
        $("#ck", card).appendChild(lab);
      });

      $("#share", card).onclick = async () => {
        const text = buildSummary();
        try {
          await navigator.clipboard.writeText(text);
          toast("行程已复制，发给 TA 吧");
        } catch {
          prompt("复制以下内容：", text);
        }
      };
      $("#next", card).onclick = () => {
        if (!state.ticket) state.ticket = ticketCode();
        save(); hearts(12); go(7);
      };
      $("#back", card).onclick = () => go(5);
    }

    function buildSummary() {
      const theme = themes.find(t => t.id === state.theme) || themes[0];
      const items = itinerary[state.theme] || itinerary.surprise;
      return [
        "【约会确认单】",
        `主题：${theme.title}`,
        `时间：${state.date} ${state.time}`,
        `地点：${state.place}`,
        `氛围：${state.mood}`,
        `穿搭：${(state.dress || []).join("、")}`,
        `留言：${state.message}`,
        "",
        "流程：",
        ...items.map((x, i) => `${i + 1}. [${x.t}] ${x.w}`),
        "",
        state.ticket ? `票根编号：${state.ticket}` : "",
      ].filter(Boolean).join("\n");
    }

    /* ---------- Step 7: Ticket ---------- */
    function viewTicket() {
      if (!state.ticket) state.ticket = ticketCode();
      const theme = themes.find(t => t.id === state.theme) || themes[0];
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="badge">终章 · 约会票根</div>
        <h1>我们说好了 💞</h1>
        <p class="subtitle">截图保存这张票，就算盖章生效。</p>
        <div class="ticket">
          <div style="font-size:2rem">${theme.emoji}</div>
          <div style="font-weight:800;font-size:1.15rem;margin-top:4px">DATE PASS</div>
          <div class="code">${state.ticket}</div>
          <div style="font-size:.9rem;color:var(--muted);line-height:1.5">「${state.message}」</div>
          <div class="row">
            <div><div class="k">主题</div><div class="v">${theme.title}</div></div>
            <div style="text-align:right"><div class="k">氛围</div><div class="v">${state.mood}</div></div>
          </div>
          <div class="row">
            <div><div class="k">时间</div><div class="v">${state.date}<br>${state.time}</div></div>
            <div style="text-align:right"><div class="k">地点</div><div class="v">${state.place}</div></div>
          </div>
          <div class="row">
            <div style="flex:1"><div class="k">穿搭提示</div><div class="v">${(state.dress || []).join(" · ")}</div></div>
          </div>
        </div>
        <div class="btns" style="margin-top:16px">
          <button class="btn" id="copy">复制完整邀请</button>
          <button class="btn secondary" id="restart">再来一次（重置）</button>
          <button class="btn ghost" id="back">返回行程</button>
        </div>
      `;
      stage.appendChild(card);
      hearts(10);
      $("#copy", card).onclick = async () => {
        const text = buildSummary();
        try {
          await navigator.clipboard.writeText(text);
          toast("已复制，发给那个特别的人吧");
        } catch {
          prompt("复制：", text);
        }
      };
      $("#restart", card).onclick = () => {
        if (!confirm("确定清空本次约会设置？")) return;
        localStorage.removeItem("date_invite_v1");
        Object.assign(state, {
          step: 0, theme: null, date: "", time: "", place: "",
          dress: [], mood: "", message: "", checklist: {}, ticket: "",
        });
        go(0);
      };
      $("#back", card).onclick = () => go(6);
    }

    // boot
    load();
    // If user had accepted before and mid-flow, resume; if stuck on 0 keep invite
    if (state.step > 0 && state.step < TOTAL) {
      go(state.step);
    } else if (state.step >= TOTAL - 1 && state.ticket) {
      go(7);
    } else {
      state.step = 0;
      go(0);
    }
  </script>
</body>
</html>
